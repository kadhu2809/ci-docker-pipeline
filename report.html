<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CI Pipeline Report</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #f1f5f9;
}

/* HEADER */
.header {
  text-align: center;
  padding: 25px;
  background: linear-gradient(90deg, #020617, #1e293b);
}
.header h1 {
  margin: 0;
  color: #38bdf8;
}
.header p {
  margin: 5px;
  color: #94a3b8;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px;
}

.card {
  padding: 20px;
  border-radius: 12px;
  width: 180px;
  text-align: center;
  color: white;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.passed { background: #22c55e; }
.failed { background: #ef4444; }
.time { background: #3b82f6; }

/* TABLE */
.table-container {
  margin: 20px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #38bdf8;
  color: black;
  padding: 10px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

tr:hover {
  background: #334155;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 15px;
  color: #94a3b8;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>🚀 CI Pipeline Test Report</h1>
  <p>Docker + GitHub Actions Automated Testing</p>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card passed">
    ✅ Passed
    <h2>2</h2>
  </div>

  <div class="card failed">
    ❌ Failed
    <h2>0</h2>
  </div>

  <div class="card time">
    ⏱ Time
    <h2>221 ms</h2>
  </div>
</div>

<!-- TABLE -->
<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Result</th>
        <th>Test</th>
        <th>Duration</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td style="color:#22c55e;">Passed</td>
        <td>test_add</td>
        <td>0 ms</td>
      </tr>
      <tr>
        <td style="color:#22c55e;">Passed</td>
        <td>test_subtract</td>
        <td>0 ms</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- FOOTER -->
<div class="footer">
  Generated by CI Pipeline | Docker + GitHub Actions
</div>

</body>
</html>
